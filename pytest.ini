# ==============================================================================
# ファイル名: pytest.ini (最終修正版)
# メモ: pythonpathにプロジェクトルート('.')を追加することで、
#      すべてのテストが 'from src.module import ...' 形式で
#      ソースコードを確実に見つけられるようにする。
# ==============================================================================
[pytest]
# testpaths: pytestがテストを探す唯一のディレクトリを指定する。
testpaths = tests

# pythonpath: pytest実行時に、Pythonの検索パス(sys.path)に
#             追加するディレクトリを指定します。
#             '.' はプロジェクトのルート、'src' はモジュール配置場所。
pythonpath =
    .
    src

# python_files: テストとして認識するファイルの命名規則。
python_files = test_*.py

# python_classes: テストとして認識するクラスの命名規則。
python_classes = Test*

# python_functions: テストとして認識する関数の命名規則。
python_functions = test_*

# norecursedirs: pytest が探索しないディレクトリ。
# 生成物やログ、ZIP成果物などをテスト対象から外したいので指定する。
norecursedirs =
    .git
    .hg
    .mypy_cache
    .pytest_cache
    .venv
    output
    logs
    patch_history
    exports
    codex_history
    sandbox_output

# addopts: pytest実行時に常に適用されるデフォルトのオプション。
# Coverage は `coverage run -m pytest` で収集するため、ここでは外しておく。
addopts = -ra
