# ==============================================================================
# ファイル名: pytest.ini (最終修正版)
# メモ: pythonpathにプロジェクトルート('.')を追加することで、
#      すべてのテストが 'from src.module import ...' 形式で
#      ソースコードを確実に見つけられるようにする。
# ==============================================================================
[pytest]
# testpaths: pytestがテストを探す唯一のディレクトリを指定する。
testpaths = tests

# pythonpath: pytest実行時に、Pythonの検索パス(sys.path)に
#             追加するディレクトリを指定します。
#             '.' はプロジェクトのルートディレクトリを意味します。
pythonpath = .

# python_files: テストとして認識するファイルの命名規則。
python_files = test_*.py

# python_classes: テストとして認識するクラスの命名規則。
python_classes = Test*

# python_functions: テストとして認識する関数の命名規則。
python_functions = test_*

# addopts: pytest実行時に常に適用されるデフォルトのオプション。
addopts = -ra --cov=src --cov-report=term-missing
