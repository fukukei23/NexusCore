name: TypeScript SDK E2E Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'sdk/typescript/**'
      - 'src/nexuscore/api/**'
      - '.github/workflows/ts-e2e.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'sdk/typescript/**'
      - 'src/nexuscore/api/**'
      - '.github/workflows/ts-e2e.yml'
  workflow_dispatch:

jobs:
  bootstrap-apikey:
    runs-on: ubuntu-latest
    outputs:
      bootstrap_key: ${{ steps.bootstrap.outputs.NEXUSCORE_BOOTSTRAP_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Initialize database
        run: |
          source venv/bin/activate
          export PYTHONPATH=src
          # DB を初期化（SQLite を使用）
          python -c "from nexuscore.webapp import create_app, db; app = create_app(); app.app_context().push(); db.create_all()"

      - name: Run bootstrap_apikey CLI
        id: bootstrap
        run: |
          source venv/bin/activate
          export PYTHONPATH=src
          # bootstrap_apikey CLI を実行して key を生成
          OUTPUT=$(python -m nexuscore.cli.bootstrap_apikey --user-login ci --key-name "CI Bootstrap Key" 2>&1)
          # 出力例: export NEXUSCORE_BOOTSTRAP_API_KEY="nexus_xxx..."
          # stdout から key を抽出（stderr の INFO メッセージは無視）
          KEY=$(echo "$OUTPUT" | grep -o 'export NEXUSCORE_BOOTSTRAP_API_KEY="[^"]*"' | sed 's/export NEXUSCORE_BOOTSTRAP_API_KEY="\([^"]*\)"/\1/')
          if [ -z "$KEY" ]; then
            echo "❌ Failed to extract bootstrap key from CLI output"
            echo "CLI output:"
            echo "$OUTPUT"
            exit 1
          fi
          # GitHub Actions の log に raw key が表示されないようにマスク
          echo "::add-mask::$KEY"
          echo "NEXUSCORE_BOOTSTRAP_API_KEY=$KEY" >> "$GITHUB_OUTPUT"
          echo "✅ Bootstrap API Key generated successfully (masked in logs)"

  ts-e2e:
    runs-on: ubuntu-latest
    needs: [bootstrap-apikey]
    env:
      NEXUSCORE_BOOTSTRAP_API_KEY: ${{ needs.bootstrap-apikey.outputs.bootstrap_key }}
      FASTAPI_BASE_URL: "http://localhost:8000"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Initialize database
        run: |
          source venv/bin/activate
          export PYTHONPATH=src
          python -c "from nexuscore.webapp import create_app, db; app = create_app(); app.app_context().push(); db.create_all()"

      - name: Start FastAPI server
        run: |
          source venv/bin/activate
          export PYTHONPATH=src
          # バックグラウンドで FastAPI サーバーを起動
          nohup python -m uvicorn nexuscore.api.fastapi_app:app --host 0.0.0.0 --port 8000 > /tmp/fastapi.log 2>&1 &
          echo $! > /tmp/fastapi.pid
          # サーバーが起動するまで待機
          sleep 5
          # ヘルスチェックでサーバーが起動したことを確認
          for i in {1..30}; do
            if curl -f http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "✅ FastAPI server is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ FastAPI server failed to start"
              cat /tmp/fastapi.log
              exit 1
            fi
            sleep 1
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TypeScript SDK dependencies
        run: |
          cd sdk/typescript
          npm install

      - name: Run TypeScript SDK E2E tests
        run: |
          cd sdk/typescript
          npm test -- tests/test_projects_e2e.test.ts

      - name: Stop FastAPI server
        if: always()
        run: |
          if [ -f /tmp/fastapi.pid ]; then
            kill $(cat /tmp/fastapi.pid) || true
          fi

