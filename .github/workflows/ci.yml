name: NexusCore CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ============================================================================
  # Security Scan (Bandit) / セキュリティスキャン（Bandit）
  # ============================================================================
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          # Scan src/ directory recursively
          # -r: recursive scan
          # -f json: generate JSON report
          # -o: output file
          # -ll: report Low+ severity issues（display用）
          # --exclude: src/sandbox_logs/（修復ログ・AST parse失敗）+ src/nexuscore/archive, src/nexuscore/api/archive（非現用コード）
          bandit -r src/ --exclude src/sandbox_logs/,src/nexuscore/archive,src/nexuscore/api/archive -f json -o bandit-report.json -ll || true

          # Display results in terminal
          echo "=== Bandit Security Scan Results ==="
          # 残る B108（/tmp の適切使用3件）は実コードで # nosec B108 明示済み・exit 0 になる
          bandit -r src/ --exclude src/sandbox_logs/,src/nexuscore/archive,src/nexuscore/api/archive -ll

      - name: Upload Bandit report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

      - name: Check for critical vulnerabilities
        run: |
          # Fail CI if Medium+ severity issues are found（-lll High only → -ll Medium+ に厳密化・2026-07-08 セキュリティレビュー指摘対応）
          # archive配下（非現用）は除外・B108（/tmp偽陽性3件）は実コードで # nosec B108 明示済み
          bandit -r src/ --exclude src/sandbox_logs/,src/nexuscore/archive,src/nexuscore/api/archive -ll -f json -o bandit-critical.json

          # Count issues
          ISSUE_COUNT=$(python -c "import json; data=json.load(open('bandit-critical.json')); print(len(data.get('results', [])))")

          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "❌ Found $ISSUE_COUNT critical security issues"
            bandit -r src/ --exclude src/sandbox_logs/,src/nexuscore/archive,src/nexuscore/api/archive -ll
            exit 1
          else
            echo "✅ No critical security issues found"
          fi

  # ============================================================================
  # Test and Coverage / テスト実行とカバレッジ測定
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      # Dummy key to avoid import-time errors when tests instantiate OpenAI clients
      OPENAI_API_KEY: dummy-key-for-tests

    strategy:
      matrix:
        # pyproject.toml requires-python >=3.12 ・datetime.UTC（3.11+）広範使用のため 3.12 のみ
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (audio)
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install dev dependencies (includes pytest-cov)
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          # pytest-xdist は requirements-dev.txt に既に含まれるが、並列実行しないため不要
          # （2026-07-08 フレーク根絶のため -n auto オプション削除）

      - name: Run tests and generate coverage report
        run: |
          # --cov=src measures coverage for entire src folder
          # --cov-report=xml generates XML report
          # --cov-report=term-missing shows missing lines
          # --cov-fail-under=80 ensures coverage doesn't drop below 80%
          # 直列実行に変更（2026-07-08 ローカル検証で -n auto --dist=loadfile による5000件規模並列実行時に
          # グローバル状態リーク起因のフレーク（run_view_coverage_boost の8件など）が確認されたため）
          python -m pytest --cov=src --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80 --durations=20

      - name: Run webapp UI smoke tests
        run: |
          pytest -q tests/webapp/

      - name: Generate Phase3 coverage report
        run: |
          # graph_builder / unified_analyzer / test_generator / tree_sitter_checker
          make coverage-phase3

      - name: Comment Phase3 coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: phase3-coverage
          path: docs/coverage_phase3_summary_ci.md

      - name: Upload test results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            coverage.xml
            test-results/
          retention-days: 7
