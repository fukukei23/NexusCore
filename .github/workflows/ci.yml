name: NexusCore CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: dummy-key-for-tests # avoid import-time errors when tests instantiate OpenAI clients

    strategy:
      matrix:
        # ★★★ 修正点: 開発環境に合わせて3.12を追加 ★★★
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (audio)
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 開発用依存関係をインストール（pytest-cov を含む）
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests and generate coverage report
        run: |
          # --cov=src で、srcフォルダ全体のカバレッジを測定
          python -m pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Run webapp UI smoke tests
        run: |
          pytest -q tests/webapp/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # 以下も素晴らしい設定です。
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
