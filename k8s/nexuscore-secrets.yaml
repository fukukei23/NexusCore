#   Method 1: kubectl create secret (manual)
#   Method 2: External Secrets Operator (recommended for production)
# ==============================================================================

# ------------------------------------------------------------------------------
# Method 1: kubectl create secret (manual deployment)
# ------------------------------------------------------------------------------
#
# kubectl create secret generic nexuscore-secrets \
#   --from-literal=database_uri="postgresql://user:SECURE_PASSWORD@postgres:5432/nexuscore" \
#   --from-literal=redis_url="redis://redis:6379/0" \
#   --from-literal=celery_broker_url="redis://redis:6379/0" \
#   --from-literal=celery_result_backend="redis://redis:6379/1" \
#   --from-literal=jwt_secret_key="$(openssl rand -base64 32)"
#
# ------------------------------------------------------------------------------
# Method 2: External Secrets Operator (production)
# ------------------------------------------------------------------------------
# Install: https://external-secrets.io/
#
# Example (AWS Secrets Manager):
#
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: nexuscore-secrets
#   namespace: nexuscore
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: ClusterSecretStore
#   target:
#     name: nexuscore-secrets
#     creationPolicy: Owner
#   data:
#     - secretKey: database_uri
#       remoteRef:
#         key: production/nexuscore/database
#         property: uri
#     - secretKey: jwt_secret_key
#       remoteRef:
#         key: production/nexuscore/auth
#         property: jwt_secret
#

# ==============================================================================
# Template (PLACEHOLDER values — DO NOT deploy with real credentials)
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: nexuscore-secrets
  namespace: default
  labels:
    app: nexuscore
type: Opaque
stringData:
  database_uri: "PLACEHOLDER_USE_KUBECTL_OR_ESO"
  redis_url: "PLACEHOLDER_USE_KUBECTL_OR_ESO"
  celery_broker_url: "PLACEHOLDER_USE_KUBECTL_OR_ESO"
  celery_result_backend: "PLACEHOLDER_USE_KUBECTL_OR_ESO"
  jwt_secret_key: "PLACEHOLDER_USE_KUBECTL_OR_ESO"
