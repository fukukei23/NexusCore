[tool.black]
include = "\.pyi?$"exclude = """
/(
    \.git
  | \.venv
  | venv
  | dist
  | build
  | __pycache__
  | .nexus
  | chroma_db
  | vector_store
  | models
  | data
  | logs
  | tmp
)/
"""line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
  ".git",
  ".venv",
  "venv",
  "dist",
  "build",
  "__pycache__",
  ".nexus",
  "chroma_db",
  "vector_store",
  "models",
  "data",
  "logs",
  "tmp",
]

[tool.ruff.lint]
select = [
  "E",  # pycodestyle
  "F",  # pyflakes
  "I",  # isort
  "B",  # bugbear
  "UP", # pyupgrade
]
ignore = [
  "E501", # 行長は Black に任せる
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
