[tool.black]
include = "\\.pyi?$"
exclude = """
/(
    \\.git
  | \\.venv
  | venv
  | dist
  | build
  | __pycache__
  | .nexus
  | chroma_db
  | vector_store
  | models
  | data
  | logs
  | tmp
)/
"""
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
  ".git",
  ".venv",
  "venv",
  "dist",
  "build",
  "__pycache__",
  ".nexus",
  "chroma_db",
  "vector_store",
  "models",
  "data",
  "logs",
  "tmp",
]

[tool.ruff.lint]
select = [
  "E",  # pycodestyle
  "F",  # pyflakes
  "I",  # isort
  "B",  # bugbear
  "UP", # pyupgrade
]
ignore = [
  "E501", # 行長は Black に任せる
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"


[tool.mutmut]
paths_to_mutate = ["src/nexuscore/agents/mutation_tester_agent.py"]
runner = "python -m pytest tests/agents/test_mutation_tester_agent.py --tb=no -q -p no:warnings --override-ini='python_files=test_mutation_tester_agent.py' --override-ini='testpaths=tests/agents'"
