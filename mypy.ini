[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True
pretty = True
exclude = (?x)(
    ^src/sandbox_logs/
  )

# src 以下をメインターゲットに
[mypy-src.*]
disallow_untyped_defs = False

# tests は最初は無視（あとで段階的に厳しくしていく）
[mypy-tests.*]
ignore_errors = True

# Pydantic モデルは mypy-pydantic プラグインがないため call-arg を無視
[mypy-nexuscore.api.routes.github_webhook]
disable_error_code = call-arg
[mypy-src.nexuscore.api.routes.github_webhook]
disable_error_code = call-arg

# SQLAlchemy declarative_base() の型エラーを無視
[mypy-database.*]
ignore_errors = True

