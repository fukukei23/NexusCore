<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{% block title %}NexusCore{% endblock %}</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #f3f4f6;
    }
    h1 { margin-bottom: 8px; }
    .subtitle { color: #6b7280; margin-bottom: 16px; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Status badges */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
    }
    .status-pending { background-color: #7f8c8d; }
    .status-running { background-color: #2980b9; animation: pulse 1.2s infinite; }
    .status-success { background-color: #27ae60; }
    .status-failed { background-color: #c0392b; }
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    /* Cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .card {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }
    .card h2 { font-size: 1rem; margin-top: 0; margin-bottom: 8px; }
    .card h3 { margin-top: 0; margin-bottom: 8px; }

    /* Metrics */
    .metric-main { font-size: 1.6rem; font-weight: 700; }
    .metric-label { font-size: 0.85rem; color: #6b7280; }
    .metric-value { font-weight: 600; }
    .metric-row {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 0.9rem;
    }

    /* Buttons */
    .btn-link {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 12px;
      border-radius: 6px;
      background-color: #2563eb;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .btn-link:hover { background-color: #1d4ed8; text-decoration: none; }

    /* Tables */
    table.simple, table.run-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    table.simple th, table.simple td,
    table.run-table th, table.run-table td {
      padding: 4px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 0.85rem;
    }
    table.simple th, table.run-table th {
      background-color: #f9fafb;
    }

    /* Flash messages */
    .flash-message {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      background-color: #e7f3ff;
      border-left: 4px solid #0066cc;
    }

    /* Runs list */
    .runs-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
      font-size: 0.85rem;
    }
    .runs-list li {
      padding: 4px 0;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
