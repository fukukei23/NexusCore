<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Kyo Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav class="bg-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <!-- ホーム（トップページ）リンクを修正 -->
            <a href="{{ url_for('main.index') }}" class="text-2xl font-bold text-gray-800">Atelier Kyo Manager</a>
            <div class="space-x-4">
                <!-- 商品管理など他のリンクも必要ならここに追加 -->
                <!-- 例：<a href="{{ url_for('main.index') }}" class="text-gray-600 hover:text-blue-500">商品管理</a> -->
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="bg-{{ 'green' if category == 'success' else 'red' }}-100 border border-{{ 'green' if category == 'success' else 'red' }}-400 text-{{ 'green' if category == 'success' else 'red' }}-700 px-4 py-3 rounded relative mb-4" role="alert">
                    <strong class="font-bold">{% if category == 'success' %}成功！{% else %}エラー！{% endif %}</strong>
                    <span class="block sm:inline">{{ message }}</span>
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
